server:
  port: 8080

spring:
  application:
    name: course-assistant-agent
  datasource:
    url: jdbc:mysql://localhost:3306/course_agent?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: agent
    password: agent123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini

app:
  chat:
    session-prefix: course-agent:session:
